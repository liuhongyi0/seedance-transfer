# ─────────────────────────────────────────────
# Seedance Wizard — Nginx 生产配置
# 适用：阿里云 ECS Ubuntu 22.04 + Let's Encrypt / 阿里云免费 DV 证书
#
# 用法：
#   sudo cp nginx.conf /etc/nginx/sites-available/seedance
#   sudo ln -s /etc/nginx/sites-available/seedance /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    listen [::]:80;
    server_name app.seedance.ai;          # ← 替换为你的域名

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;            # certbot webroot 验证
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.seedance.ai;          # ← 替换为你的域名

    # ── SSL 证书 ─────────────────────────────────
    # 方式一：Let's Encrypt（推荐，免费自动续期）
    #   certbot --nginx -d app.seedance.ai
    # 方式二：阿里云免费 DV 证书（手动上传）
    ssl_certificate     /etc/ssl/seedance/fullchain.pem;   # ← 替换路径
    ssl_certificate_key /etc/ssl/seedance/privkey.pem;     # ← 替换路径

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── 安全头 ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── 请求体限制 ───────────────────────────────
    client_max_body_size 20M;   # 支持 base64 图片上传（原图约 5MB，base64 ≈ 7MB）

    # ── 后端 API 反向代理 (/api/*) ───────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 长轮询接口（视频状态查询）超时设长
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── 健康检查端点 ──────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Next.js 前端 ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # ── Next.js 静态资源缓存 ──────────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_cache_valid  200 365d;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── 访问日志 ──────────────────────────────────
    access_log /var/log/nginx/seedance_access.log;
    error_log  /var/log/nginx/seedance_error.log warn;
}
