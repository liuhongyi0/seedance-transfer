name: Publish to ComfyUI Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "comfyui-seedance-wizard/pyproject.toml"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy pyproject.toml to root
        run: cp comfyui-seedance-wizard/pyproject.toml pyproject.toml
      - name: Publish to Comfy Registry
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.COMFY_REGISTRY_TOKEN }}
          skip_checkout: true
