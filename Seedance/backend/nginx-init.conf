# Temp nginx config — HTTP only, used during initial certbot run
server {
    listen 80;
    listen [::]:80;
    server_name see4dance.com www.see4dance.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "Seedance SSL setup in progress\n";
    }
}
