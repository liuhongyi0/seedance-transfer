services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: seedance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: seedance
      POSTGRES_USER: seedance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-seedance-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "seedance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 后端API服务 ───────────────────────────────────────────
  backend:
    build: .
    container_name: seedance-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://seedance:${DB_PASSWORD:-seedance-dev}@postgres:5432/seedance
      - DEPLOYMENT_REGION=${DEPLOYMENT_REGION:-cn}
      - EVOLINK_API_KEY=${EVOLINK_API_KEY}
      - VOLC_API_KEY=${VOLC_API_KEY}
      - IMGBB_API_KEY=${IMGBB_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-seedance-dev-secret-change-in-production}
      - BASE_URL=${BASE_URL:-http://localhost:80}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── 前端 nginx ────────────────────────────────────────────
  frontend:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: seedance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
