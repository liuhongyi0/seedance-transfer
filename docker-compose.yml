# Seedance Studio — One-Click Deployment
# Usage: docker compose up -d
#
# Services:
#   backend   — FastAPI (Python 3.11) on port 8000
#   db        — PostgreSQL 16
#   nginx     — Reverse proxy on ports 80/443 (SSL via Let's Encrypt)
#   certbot   — Auto-renew TLS certificates
#   backup    — Daily PostgreSQL dump (3:00 AM, keeps 7 days)

services:
  backend:
    build:
      context: Seedance/backend
      dockerfile: Dockerfile
    container_name: seedance-backend
    restart: unless-stopped
    env_file:
      - Seedance/backend/.env
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://seedance:${DB_PASSWORD:-seedance_dev}@db:5432/seedance
      - BASE_URL=https://see4dance.com
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seedance-net

  db:
    image: postgres:16-alpine
    container_name: seedance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: seedance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-seedance_dev}
      POSTGRES_DB: seedance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seedance"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - seedance-net

  nginx:
    image: nginx:alpine
    container_name: seedance-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - Seedance/backend/static:/usr/share/nginx/html:ro
      - Seedance/backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - seedance-net

  certbot:
    image: certbot/certbot:latest
    container_name: seedance-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    container_name: seedance-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD:-seedance_dev}
      BACKUP_KEEP_DAYS: 7
    volumes:
      - backups:/backups
      - ./deploy/backup-entry.sh:/backup-entry.sh:ro
    entrypoint: /bin/sh -c '
      echo "0 3 * * * /backup-entry.sh" | crontab - &&
      crond -f -l 2'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seedance-net

volumes:
  pgdata:
  certbot_www:
  certbot_conf:
  backups:

networks:
  seedance-net:
    driver: bridge
